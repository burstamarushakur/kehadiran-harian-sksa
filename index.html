<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kehadiran HEM SKSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxphS1-lxJ_E6u8tB4I-xCdW6MXaKaIlH2D50pSZfppqfNwtqHkDHAMbfwncs0ydvJv/exec';

    function App() {
      const getTodayMalaysia = () => {
        const now = new Date();
        const malaysiaTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
        return malaysiaTime.toISOString().split('T')[0];
      };

      const [currentDate, setCurrentDate] = useState(getTodayMalaysia());
      const [studentsData, setStudentsData] = useState({});
      const [attendanceData, setAttendanceData] = useState({});
      const [isLoading, setIsLoading] = useState(true);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedClass, setSelectedClass] = useState(null);
      const [formBilTakHadir, setFormBilTakHadir] = useState(0);
      const [formSelectedNames, setFormSelectedNames] = useState([]);
      const [formError, setFormError] = useState('');

      const formatDateDisplay = (dateString) => {
        if (!dateString) return '';
        const [year, month, day] = dateString.split('-');
        return `${day}-${month}-${year}`;
      };

      const normalizeDate = (str) => {
        if (!str) return '';
        const cleanStr = str.replace(/\//g, '-').trim();
        const parts = cleanStr.split('-');
        if (parts.length !== 3) return '';
        const d = parts[0].padStart(2, '0');
        const m = parts[1].padStart(2, '0');
        let y = parts[2];
        if (y.length === 2) y = "20" + y;
        return `${y}-${m}-${d}`;
      };

      const fetchAllData = async () => {
        setIsLoading(true);
        try {
          const [classesRes, attendanceRes] = await Promise.all([
            fetch(`${GAS_URL}?action=getClasses`).then(res => res.json()),
            fetch(`${GAS_URL}?action=getAttendance`).then(res => res.json())
          ]);
          
          if (classesRes.status === 'success') setStudentsData(classesRes.data);
          
          if (attendanceRes.status === 'success') {
            const mapped = {};
            attendanceRes.data.forEach(rec => {
              const isoDate = normalizeDate(rec.tarikh);
              const kelasKey = rec.kelas.trim();
              if (isoDate) {
                if (!mapped[isoDate]) mapped[isoDate] = {};
                mapped[isoDate][kelasKey] = {
                  status: 'Selesai',
                  bilTakHadir: parseInt(rec.bilTakHadir),
                  namaTakHadir: (rec.namaTakHadir[0] === 'Hadir Semua' || !rec.namaTakHadir[0]) ? [] : rec.namaTakHadir
                };
              }
            });
            setAttendanceData(mapped);
          }
        } catch (err) { console.error(err); }
        finally { setIsLoading(false); }
      };

      useEffect(() => { fetchAllData(); }, []);

      const stats = useMemo(() => {
        const daily = attendanceData[currentDate] || {};
        let sub = 0, totalS = 0, absent = 0;
        Object.entries(studentsData).forEach(([name, list]) => {
          totalS += list.length;
          if (daily[name.trim()]) { sub++; absent += daily[name.trim()].bilTakHadir; }
        });
        return { sub, totalC: Object.keys(studentsData).length, totalS, absent, pct: totalS > 0 ? (((totalS - absent) / totalS) * 100).toFixed(1) : 0 };
      }, [attendanceData, currentDate, studentsData]);

      const handleSubmit = async () => {
        if (formBilTakHadir > 0 && formSelectedNames.some(n => !n)) return setFormError('Sila pilih nama murid.');
        setIsSubmitting(true);
        try {
          await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'simpanKehadiran', payload: { tarikh: formatDateDisplay(currentDate), kelas: selectedClass.trim(), bilTakHadir: formBilTakHadir, namaTakHadir: formSelectedNames }}) 
          });
          await fetchAllData();
          setCurrentView('dashboard');
        } catch (e) { setFormError('Gagal simpan.'); }
        finally { setIsSubmitting(false); }
      };

      const getAvailableOptions = (currentIndex) => {
        const allStudents = studentsData[selectedClass] || [];
        return allStudents.filter(student => {
          if (formSelectedNames[currentIndex] === student) return true;
          return !formSelectedNames.includes(student);
        });
      };

      if (isLoading) return (
        <div className="flex h-screen items-center justify-center flex-col gap-8 bg-white text-center">
            <img src="https://i.postimg.cc/vHfb7N7V/Whats-App-Image-2026-03-04-at-10-00-06.jpg" className="w-40 h-40 object-contain animate-vibrate" />
            <p className="font-black text-slate-800 tracking-widest uppercase">Dalman sedang memerhatikan anda</p>
        </div>
      );

      if (isSubmitting) return (
        <div className="flex h-screen items-center justify-center flex-col gap-8 bg-white text-center">
            <img src="https://i.postimg.cc/vHfb7N7V/Whats-App-Image-2026-03-04-at-10-00-06.jpg" className="w-40 h-40 object-contain animate-hop" />
            <p className="font-black text-indigo-700 uppercase">GPK HEM berterima kasih atas kerjasama anda</p>
        </div>
      );

      return (
        <div className="max-w-6xl mx-auto p-4 md:p-8 min-h-screen flex flex-col">
          {currentView === 'dashboard' ? (
            <div className="space-y-6 flex-grow animate-fade-in">
              <div className="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-6 border-slate-100">
                <div className="flex items-center space-x-6">
                  <img src="https://i.postimg.cc/vHfb7N7V/Whats-App-Image-2026-03-04-at-10-00-06.jpg" className="w-24 h-24 md:w-36 md:h-36 object-contain" />
                  <div>
                    <h1 className="text-lg md:text-2xl font-black text-slate-800 uppercase leading-tight">Dashboard Kehadiran SKSA</h1>
                    <p className="text-xs font-bold text-slate-400 tracking-widest uppercase mt-1">UNIT HEM, MUAR JOHOR</p>
                  </div>
                </div>
                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center gap-3">
                    <i className="far fa-calendar-check text-indigo-600 text-xl"></i>
                    <input type="date" className="bg-transparent border-none font-black text-slate-700 outline-none" value={currentDate} onChange={e => setCurrentDate(e.target.value)} />
                </div>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p className="text-[10px] text-slate-400 font-black uppercase mb-1">Status Pengisian</p><p className="text-xl font-black">{stats.sub} / {stats.totalC} <span className="text-xs font-normal">Kelas</span></p></div>
                <div className="bg-rose-50 p-5 rounded-2xl border border-rose-100 shadow-sm"><p className="text-[10px] text-rose-600 font-black uppercase mb-1 tracking-tighter">Tidak Hadir</p><p className="text-xl font-black text-rose-700">{stats.absent} / {stats.totalS} <span className="text-[10px] font-normal uppercase">Murid</span></p></div>
                <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 col-span-2 md:col-span-1 shadow-sm"><p className="text-[10px] text-indigo-600 font-black uppercase mb-1">% Kehadiran</p><p className="text-xl font-black text-indigo-700">{stats.pct}%</p></div>
              </div>

              <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                <div className="p-5 border-b bg-slate-50/50 font-black text-slate-700 text-[10px] uppercase tracking-[0.2em]">Senarai Kelas Harian</div>
                <div className="overflow-x-auto">
                    <table className="w-full text-left">
                    <thead className="hidden md:table-header-group bg-slate-50 text-[10px] uppercase text-slate-400 font-black">
                        <tr><th className="p-5">Nama Kelas</th><th>Status</th><th>Bil</th><th>Nama Murid Tidak Hadir</th><th className="text-right p-5">Tindakan</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                        {Object.keys(studentsData).map(c => {
                        const d = (attendanceData[currentDate] || {})[c.trim()];
                        return (
                            <tr key={c} className="hover:bg-slate-50/50 transition-colors flex flex-col md:table-row p-5 md:p-0">
                            <td className="md:p-5 font-black text-slate-800 text-lg md:text-sm">{c}</td>
                            <td className="py-2 md:py-0">{d ? <span className="text-emerald-600 font-black text-[10px] bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100 uppercase">✓ SELESAI</span> : <span className="text-amber-500 font-black text-[10px] bg-amber-50 px-2 py-1 rounded-full border border-amber-100 uppercase">⏳ BELUM DIISI</span>}</td>
                            <td className="font-black text-slate-700 py-1 md:py-0">{d ? d.bilTakHadir : '-'}</td>
                            <td className="py-2 md:py-0">
                                {d && d.bilTakHadir > 0 ? (
                                    <div className="flex flex-wrap gap-1.5">{d.namaTakHadir.map((n, i) => <span key={i} className="bg-rose-50 text-rose-600 text-[10px] px-2 py-1 rounded-lg border border-rose-100 font-bold">{n}</span>)}</div>
                                ) : d ? <span className="text-slate-300 text-xs italic">Hadir Semua</span> : '-'}
                            </td>
                            <td className="md:p-5 text-right pt-4 md:pt-0">
                                <button onClick={() => { setSelectedClass(c); setFormBilTakHadir(0); setFormSelectedNames([]); setCurrentView('form'); }} className={`w-full md:w-auto px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${d ? 'bg-slate-100 text-slate-400' : 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 hover:scale-105'}`}>{d ? 'Kemaskini' : 'Isi Kehadiran'}</button>
                            </td>
                            </tr>
                        );
                        })}
                    </tbody>
                    </table>
                </div>
              </div>
            </div>
          ) : (
            <div className="bg-white p-8 rounded-[2rem] border shadow-2xl max-w-lg mx-auto w-full my-auto animate-slide-up border-slate-100">
              <button onClick={() => setCurrentView('dashboard')} className="flex items-center text-xs font-black text-slate-400 hover:text-indigo-600 uppercase mb-10 tracking-[0.2em]"><i className="fas fa-arrow-left mr-2"></i> Kembali ke Papan Pemuka</button>
              <h2 className="text-3xl font-black mb-1 text-slate-800 uppercase tracking-tighter text-center">KELAS {selectedClass}</h2>
              <p className="text-[10px] text-slate-400 mb-8 font-bold uppercase tracking-widest border-b pb-5 text-center">Unit HEM SK Sungai Abong</p>
              <div className="space-y-8">
                <div className="space-y-3">
                  <label className="block text-xs font-black text-slate-600 uppercase tracking-widest text-center">1. Bilangan murid tidak hadir?</label>
                  <select className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-black text-indigo-600 outline-none focus:border-indigo-500" value={formBilTakHadir} onChange={e => { const v = parseInt(e.target.value); setFormBilTakHadir(v); setFormSelectedNames(new Array(v).fill('')); }}>
                    {[...Array(studentsData[selectedClass].length + 1).keys()].map(n => <option key={n} value={n}>{n} Orang</option>)}
                  </select>
                </div>
                {formBilTakHadir > 0 && (
                  <div className="space-y-4 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center">2. Pilih Nama Murid:</p>
                    {Array.from({ length: formBilTakHadir }).map((_, i) => (
                      <select key={i} className="w-full p-4 bg-white border-2 border-slate-100 rounded-xl font-bold text-slate-700 shadow-sm" value={formSelectedNames[i]} onChange={e => { const n = [...formSelectedNames]; n[i] = e.target.value; setFormSelectedNames(n); }}>
                        <option value="">-- PILIH NAMA --</option>
                        {getAvailableOptions(i).map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    ))}
                  </div>
                )}
                {formError && <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-rose-600 text-[10px] font-black flex items-center gap-3 animate-bounce"><i className="fas fa-exclamation-circle text-lg"></i>{formError}</div>}
                <div className="pt-4 space-y-4">
                    <button onClick={handleSubmit} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-2xl shadow-indigo-200 uppercase tracking-widest" disabled={isSubmitting}>{isSubmitting ? 'MENYIMPAN...' : 'HANTAR LAPORAN'}</button>
                    <button onClick={() => setCurrentView('dashboard')} className="w-full py-2 text-slate-300 text-[10px] font-black uppercase tracking-[0.4em] hover:text-rose-500 font-bold">Batal</button>
                </div>
              </div>
            </div>
          )}
          <footer className="mt-16 text-center text-slate-300 text-[10px] uppercase border-t border-slate-100 pt-10 pb-12 font-bold tracking-[0.2em]">
            @HAK MILIK UNIT HEM, SK SG ABONG | MODERATOR: ACAP GARANG
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes vibrate { 0% { transform: translate(0); } 10% { transform: translate(-2px, -2px) rotate(-1deg); } 20% { transform: translate(2px, 2px) rotate(1deg); } 40% { transform: translate(2px, -2px) rotate(1deg); } 100% { transform: translate(0); } }
    .animate-vibrate { animation: vibrate 0.1s linear infinite; }
    @keyframes hop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .animate-hop { animation: hop 0.4s ease-in-out infinite; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</body>
</html>
