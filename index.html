<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kehadiran HEM SKSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxphS1-lxJ_E6u8tB4I-xCdW6MXaKaIlH2D50pSZfppqfNwtqHkDHAMbfwncs0ydvJv/exec';

    function App() {
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [studentsData, setStudentsData] = useState({});
      const [attendanceData, setAttendanceData] = useState({});
      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedClass, setSelectedClass] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formBilTakHadir, setFormBilTakHadir] = useState(0);
      const [formSelectedNames, setFormSelectedNames] = useState([]);
      const [formError, setFormError] = useState('');

      const formatDateDisplay = (dateString) => {
        if (!dateString) return '';
        const [year, month, day] = dateString.split('-');
        return `${day}-${month}-${year}`;
      };

      useEffect(() => {
        const fetchAllData = async () => {
          setIsLoading(true);
          try {
            const [classesRes, attendanceRes] = await Promise.all([
              fetch(`${GAS_URL}?action=getClasses`).then(res => res.json()),
              fetch(`${GAS_URL}?action=getAttendance`).then(res => res.json())
            ]);
            if (classesRes.status === 'success') setStudentsData(classesRes.data);
            if (attendanceRes.status === 'success') {
              const loadedAttendance = {};
              attendanceRes.data.forEach(record => {
                let yyyymmdd = record.tarikh;
                if (record.tarikh.includes('-')) {
                  const parts = record.tarikh.split('-');
                  if (parts.length === 3 && parts[2].length === 4) yyyymmdd = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (!loadedAttendance[yyyymmdd]) loadedAttendance[yyyymmdd] = {};
                loadedAttendance[yyyymmdd][record.kelas] = {
                  status: 'Selesai',
                  bilTakHadir: parseInt(record.bilTakHadir) || 0,
                  namaTakHadir: record.namaTakHadir[0] === 'Hadir Semua' ? [] : record.namaTakHadir
                };
              });
              setAttendanceData(loadedAttendance);
            }
          } catch (err) { console.error(err); }
          finally { setIsLoading(false); }
        };
        fetchAllData();
      }, []);

      const stats = useMemo(() => {
        const daily = attendanceData[currentDate] || {};
        let sub = 0, totalS = 0, absent = 0;
        Object.entries(studentsData).forEach(([name, list]) => {
          totalS += list.length;
          if (daily[name]) { sub++; absent += daily[name].bilTakHadir; }
        });
        return { sub, totalC: Object.keys(studentsData).length, totalS, absent, pct: totalS > 0 ? (((totalS - absent) / totalS) * 100).toFixed(1) : 0 };
      }, [attendanceData, currentDate, studentsData]);

      const handleSubmit = async () => {
        if (formBilTakHadir > 0 && formSelectedNames.some(n => !n)) return setFormError('Sila pilih semua nama murid yang tidak hadir.');
        setIsSubmitting(true);
        try {
          await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'simpanKehadiran', payload: { tarikh: formatDateDisplay(currentDate), kelas: selectedClass, bilTakHadir: formBilTakHadir, namaTakHadir: formSelectedNames }}) });
          setAttendanceData(prev => ({ ...prev, [currentDate]: { ...prev[currentDate], [selectedClass]: { status: 'Selesai', bilTakHadir: formBilTakHadir, namaTakHadir: formSelectedNames }}}));
          setCurrentView('dashboard');
        } catch (e) { setFormError('Gagal simpan data.'); }
        finally { setIsSubmitting(false); }
      };

      const getAvailableOptions = (currentIndex) => {
        const allStudents = studentsData[selectedClass] || [];
        return allStudents.filter(student => {
          if (formSelectedNames[currentIndex] === student) return true;
          return !formSelectedNames.includes(student);
        });
      };

      if (isLoading) return (
        <div className="flex h-screen items-center justify-center flex-col gap-4 text-slate-500">
            <i className="fas fa-spinner fa-spin text-4xl text-indigo-600"></i>
            <p className="font-bold animate-pulse">Acap sedang tolong dell memuat naik data...</p>
        </div>
      );

      return (
        <div className="max-w-6xl mx-auto p-4 md:p-8 min-h-screen flex flex-col">
          {currentView === 'dashboard' ? (
            <div className="space-y-6 flex-grow animate-fade-in">
              {/* Header */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center space-x-6">
                  <img src="https://i.postimg.cc/vHfb7N7V/Whats-App-Image-2026-03-04-at-10-00-06.jpg" className="w-24 h-24 md:w-40 md:h-40 object-contain rounded-xl" />
                  <div>
                    <h1 className="text-lg md:text-2xl font-bold text-slate-800 leading-tight">DASHBOARD KEHADIRAN HARIAN MURID</h1>
                    <p className="text-sm md:text-lg font-semibold text-slate-500 uppercase tracking-tight">Unit HEM, SK Sg Abong</p>
                  </div>
                </div>
                <div className="flex items-center space-x-2 bg-slate-50 p-3 rounded-xl border">
                    <i className="far fa-calendar-alt text-indigo-600"></i>
                    <input type="date" className="bg-transparent border-none font-black text-slate-700 outline-none cursor-pointer" value={currentDate} onChange={e => setCurrentDate(e.target.value)} />
                </div>
              </div>

              {/* Stats */}
              <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div className="bg-white p-4 rounded-xl border shadow-sm"><p className="text-[10px] text-slate-500 mb-1 font-bold uppercase">Status Pengisian</p><p className="text-xl md:text-2xl font-black text-slate-800">{stats.sub} / {stats.totalC} <span className="text-xs font-normal">Kelas</span></p></div>
                <div className="bg-rose-50 p-4 rounded-xl border border-rose-100 shadow-sm"><p className="text-[10px] text-rose-600 mb-1 font-bold uppercase">Tidak Hadir</p><p className="text-xl md:text-2xl font-black text-rose-700">{stats.absent} <span className="text-xs font-normal">Murid</span></p></div>
                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 col-span-2 md:col-span-1 shadow-sm"><p className="text-[10px] text-indigo-600 mb-1 font-bold uppercase">% Kehadiran</p><p className="text-xl md:text-2xl font-black text-indigo-700">{stats.pct}%</p></div>
              </div>

              {/* Table Section */}
              <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <div className="p-4 border-b bg-slate-50/50 font-bold text-slate-700 text-sm tracking-wide">SENARAI KELAS HARIAN</div>
                
                {/* Mobile View (Cards) */}
                <div className="md:hidden divide-y divide-slate-100">
                  {Object.keys(studentsData).map(c => {
                    const d = (attendanceData[currentDate] || {})[c];
                    return (
                      <div key={c} className="p-4 space-y-4">
                        <div className="flex justify-between items-start">
                            <div><p className="font-black text-slate-800 text-lg">{c}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{studentsData[c].length} Murid Berdaftar</p></div>
                            {d ? <span className="bg-emerald-100 text-emerald-700 text-[10px] px-3 py-1 rounded-full font-black ring-1 ring-emerald-200 uppercase">✓ Selesai</span> : <span className="bg-amber-100 text-amber-700 text-[10px] px-3 py-1 rounded-full font-black ring-1 ring-amber-200 uppercase">⏳ Belum</span>}
                        </div>
                        {d && d.bilTakHadir > 0 && (
                            <div className="flex flex-wrap gap-1.5 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                {d.namaTakHadir.map((n, i) => <span key={i} className="bg-rose-50 text-rose-600 text-[10px] px-2 py-1 rounded-lg border border-rose-100 font-bold">{n}</span>)}
                            </div>
                        )}
                        <button onClick={() => { setSelectedClass(c); setFormBilTakHadir(0); setFormSelectedNames([]); setCurrentView('form'); }} className={`w-full py-3.5 rounded-2xl text-sm font-black uppercase tracking-widest shadow-sm transition-all active:scale-95 ${d ? 'bg-slate-100 text-slate-400' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{d ? 'Kemaskini' : 'Isi Kehadiran'}</button>
                      </div>
                    );
                  })}
                </div>

                {/* Desktop View (Table) */}
                <table className="hidden md:table w-full text-left">
                  <thead className="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black tracking-widest">
                    <tr><th className="p-5">Nama Kelas</th><th>Status</th><th>Bil</th><th>Nama Murid Tidak Hadir</th><th className="text-right p-5">Tindakan</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {Object.keys(studentsData).map(c => {
                      const d = (attendanceData[currentDate] || {})[c];
                      return (
                        <tr key={c} className="hover:bg-slate-50/50 transition-colors">
                          <td className="p-5"><strong>{c}</strong><br/><span className="text-[10px] text-slate-400 font-bold uppercase">{studentsData[c].length} Murid</span></td>
                          <td>{d ? <span className="text-emerald-600 font-black text-xs">✓ SELESAI</span> : <span className="text-amber-500 font-black text-xs italic">⏳ BELUM DIISI</span>}</td>
                          <td className="font-black text-slate-700">{d ? d.bilTakHadir : '-'}</td>
                          <td>
                            {d && d.bilTakHadir > 0 ? (
                                <div className="flex flex-wrap gap-1 max-w-sm py-2">
                                    {d.namaTakHadir.map((n, i) => <span key={i} className="bg-rose-50 text-rose-600 text-[10px] px-2 py-1 rounded-md border border-rose-100 font-bold shadow-sm">{n}</span>)}
                                </div>
                            ) : d ? <span className="text-slate-300 italic text-xs font-medium">Tiada (Semua Hadir)</span> : '-'}
                          </td>
                          <td className="p-5 text-right">
                            <button onClick={() => { setSelectedClass(c); setFormBilTakHadir(0); setFormSelectedNames([]); setCurrentView('form'); }} className={`px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-wider transition-all ${d ? 'bg-slate-100 text-slate-400 hover:bg-slate-200' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-100'}`}>{d ? 'Kemaskini' : 'Isi Kehadiran'}</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ) : (
            /* FORM VIEW */
            <div className="bg-white p-6 rounded-3xl border shadow-2xl max-w-lg mx-auto w-full my-auto animate-slide-up border-slate-100">
              {/* BUTANG KEMBALI DI ATAS */}
              <button onClick={() => setCurrentView('dashboard')} className="flex items-center text-xs font-black text-slate-400 hover:text-indigo-600 uppercase tracking-widest mb-8 group transition-all">
                <i className="fas fa-chevron-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Kembali ke Halaman Utama
              </button>

              <h2 className="text-2xl font-black mb-1 text-slate-800 uppercase tracking-tight">KELAS {selectedClass}</h2>
              <p className="text-[10px] text-slate-400 mb-8 font-bold uppercase tracking-widest border-b pb-4">Pengisian Laporan Kehadiran Murid</p>
              
              <div className="space-y-8">
                <div className="space-y-3">
                  <label className="block text-sm font-black text-slate-700 uppercase tracking-tight">1. Berapa orang murid tidak hadir?</label>
                  <select className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-black text-indigo-600 outline-none focus:border-indigo-500 transition-all appearance-none" value={formBilTakHadir} onChange={e => { const v = parseInt(e.target.value); setFormBilTakHadir(v); setFormSelectedNames(new Array(v).fill('')); }}>
                    {[...Array(studentsData[selectedClass].length + 1).keys()].map(n => <option key={n} value={n}>{n} Orang</option>)}
                  </select>
                </div>

                {formBilTakHadir > 0 && (
                  <div className="space-y-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">2. Sila Pilih Nama Murid:</p>
                    {Array.from({ length: formBilTakHadir }).map((_, i) => (
                      <div key={i} className="animate-fade-in space-y-1">
                        <select className="w-full p-4 bg-white border-2 border-slate-100 rounded-xl shadow-sm font-bold text-slate-700 outline-none focus:border-rose-400 transition-all" value={formSelectedNames[i]} onChange={e => { const n = [...formSelectedNames]; n[i] = e.target.value; setFormSelectedNames(n); }}>
                            <option value="">-- PILIH NAMA MURID --</option>
                            {getAvailableOptions(i).map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                )}

                {formError && <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-rose-600 text-xs font-black flex items-center gap-3 animate-bounce"><i className="fas fa-exclamation-circle text-lg"></i>{formError}</div>}
                
                <div className="pt-6 space-y-4">
                    <button onClick={handleSubmit} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all disabled:opacity-50 uppercase tracking-widest" disabled={isSubmitting}>{isSubmitting ? 'MENYIMPAN DATA...' : 'HANTAR LAPORAN KEHADIRAN'}</button>
                    <button onClick={() => setCurrentView('dashboard')} className="w-full py-2 text-slate-300 text-[10px] font-black uppercase tracking-widest hover:text-rose-500 transition-colors">BATALKAN</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="mt-12 text-center text-slate-300 text-[10px] uppercase border-t border-slate-100 pt-10 pb-10">
            <p className="mb-1 tracking-[0.2em] font-bold">@HAK MILIK UNIT HEM, SK SG ABONG</p>
            <p className="font-black text-slate-400 tracking-tighter">MODERATOR: ACAP GARANG</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</body>
</html>
